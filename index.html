<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PŠP Eksperts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #22c55e;
            --error: #ef4444;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            align-self: flex-start;
        }

        .progress-bar-bg {
            height: 6px;
            background: #334155;
            border-radius: 10px;
            margin: 15px 0 25px 0;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        h1 { font-size: 1.3rem; margin: 0 0 20px 0; font-weight: 800; }
        .step-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; line-height: 1.4; }

        .options-container { display: grid; gap: 10px; }

        .option-card {
            background: #334155;
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .option-card.selected { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); }

        .review-item {
            background: #0f172a;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            text-align: left;
            border-left: 4px solid var(--error);
        }
        .review-item.is-correct { border-left-color: var(--success); }
        .review-q { font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; }
        .review-a { font-size: 0.8rem; }

        .btn-action {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }
        .btn-action:disabled { opacity: 0.3; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #334155; padding: 15px; border-radius: 16px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="quiz-screen">
        <span class="step-label" id="step-counter">Jautājums 1 no 5</span>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
        <div id="q-content">
            <p class="question-text" id="q-text"></p>
            <div class="options-container" id="options-list"></div>
        </div>
        <button class="btn-action" id="next-btn" onclick="nextQuestion()" disabled>Turpināt</button>
    </div>

    <div id="result-screen" style="display:none; text-align: center;">
        <h1>Testa Rezultāti</h1>
        <div class="stat-grid">
            <div class="stat-box"><span id="res-correct" style="color:var(--success); font-weight:800; font-size:1.2rem;">0</span><br><small>Pareizi</small></div>
            <div class="stat-box"><span id="res-wrong" style="color:var(--error); font-weight:800; font-size:1.2rem;">0</span><br><small>Nepareizi</small></div>
        </div>
        <div id="review-container" style="max-height: 350px; overflow-y: auto; padding-right: 5px;"></div>
        <button class="btn-action" onclick="location.reload()">Sākt jaunu testu</button>
    </div>
</div>

<script>
    // 20 detalizēti jautājumi no materiāla
    const database = [
        { q: "Kāds ir galvenais nosacījums vaiga novietojumam pie laides?", a: ["Tam jābūt cieši piespiestam", "Tam jābūt optimālā attālumā no aizmugurējās tēmēšanas ierīces", "Tam jāatrodas pēc iespējas tuvāk stobram"], c: 1 },
        { q: "Kas jādara, ja dabiskajā elpošanas pauzē neizdodas veikt šāvienu?", a: ["Jāturpina elpas aizturēšana līdz šāvienam", "Šāviens jāveic nākamajā pauzes brīdī", "Jāveic strauja ieelpa un uzreiz jāšauj"], c: 1 },
        { q: "Kādu efektu sniedz mēlītes brīvgājiena izspiešana?", a: ["Paātrina lodes lidojumu", "Novērš papildus ieroča kustības šāviena brīdī", "Samazina ieroča atsitienu"], c: 1 },
        { q: "Kādam jābūt fokusējumam uz mērķēšanas ierīcēm?", a: ["Skaidri jāredz mērķis un mērķeklis", "Skaidri jāredz grauds, bet mērķis nedaudz izplūdis", "Visiem elementiem jābūt vienādi asiem"], c: 1 },
        { q: "Kas notiek ar ieroci, ja mēlīti nospiež pārāk strauji?", a: ["Tas pakustas uz augšu", "Tas pakustas uz leju", "Tas paliek nekustīgs"], c: 1 },
        { q: "Kāds ir dominējošās acs noteikšanas galvenais princips?", a: ["Tā ir acs, ar kuru tēmējot objekts neiziet no trijstūra", "Tā ir acs, kura redz objektu lielāku", "Tā ir acs, kuru aizverot objekts paliek vietā"], c: 0 },
        { q: "Cik fāzes ir mēlītes nospiedienam?", a: ["Viena fāze: šāviens", "Divas fāzes: brīvgājiens un šāviens", "Trīs fāzes: tēmēšana, brīvgājiens, šāviens"], c: 1 },
        { q: "Kādai jābūt šaušanas pozīcijai attiecībā pret tēmēšanas punktu?", a: ["Ar spēku vērstai pret mērķi", "Nepiespiesti vērstai pret mērķi", "Sāniski vērstai pret mērķi"], c: 1 },
        { q: "Kāds ir dabiskās elpošanas pauzes aptuvenais ilgums?", a: ["1-2 sekundes", "5-8 sekundes", "Puse sekundes"], c: 0 },
        { q: "Kur tieši uz rādītājpirksta jāatrodas mēlītei?", a: ["Uz pirmās locītavas", "Uz pirksta gala vidējās daļas", "Uz pirksta paša galiņa"], c: 1 },
        { q: "Kāpēc svarīgs muskuļu atslābums stabilā pozīcijā?", a: ["Lai mazinātu ieroča atsitienu", "Lai ierocis veiktu pēc iespējas mazāku kustību", "Lai varētu šaut ātrāk"], c: 1 },
        { q: "Kā jārīkojas pēc tam, kad panākta skaidra tēmēšanas līnija?", a: ["Jāveic korekcija ar ķermeni", "Galvu vairs nekustina, tēmē un šauj", "Jāpārbauda tēmēklis vēlreiz"], c: 1 },
        { q: "Kuru elementu NEIETVER stabila šaušanas pozīcija pēc materiāla?", a: ["Pistoļveida roktura satvēriens", "Kāju novietojums 45 grādos", "Vaiga novietojums pie laides"], c: 1 },
        { q: "Kas jādara, lai savietotu mērķēšanas ierīces?", a: ["Jānovieto grauda gals mērķekļa centrā", "Jāskatās tikai uz mērķi caur mērķekli", "Jānovieto mērķeklis grauda augšpusē"], c: 0 },
        { q: "Kādai jābūt mēlītes nospiešanas kustībai?", a: ["Ātrai un kontrolētai", "Lēnai un šāvienam jābūt negaidītam", "Pakāpeniskai ar pauzi vidū"], c: 1 },
        { q: "Kas palīdz centrēt objektu mērķekļa aplī?", a: ["Acs dabiskā īpašība tiekties pēc lielākā gaismas daudzuma", "Speciāls ieroča optiskais pārklājums", "Ciešs satvēriens ar abām rokām"], c: 0 },
        { q: "Kāds elements palīdz izveidot tēmēšanas līniju?", a: ["Acs - tēmēšanas ierīces - mērķis", "Acs - laide - stobrs", "Mērķis - grauds - plecs"], c: 0 },
        { q: "Kāda ir pareizā secība elpošanas kontrolei?", a: ["Ieelpa -> Šāviens -> Izelpa", "Ieelpa -> Izelpa -> Pauze/Šāviens", "Izelpa -> Ieelpa -> Pauze/Šāviens"], c: 1 },
        { q: "Ko ietver tēmēšana saskaņā ar PŠP?", a: ["Tikai mērķa atrašanu", "Dominējošo aci, fokusu un ierīču savietošanu", "Ieroča ieplecošanu un acs fokusu"], c: 1 },
        { q: "Kādam jābūt rokas satvērienam pie pastobres?", a: ["Cieši sasprindzinātam", "Nepiespiestam kā daļai no stabilas pozīcijas", "Tikpat stingram kā pistoļveida rokturim"], c: 1 }
    ];

    let currentQ = 0;
    let score = 0;
    let userChoices = [];
    const testSize = 5; // Cik jautājumus uzdot vienā reizē
    const activeQuestions = database.sort(() => 0.5 - Math.random()).slice(0, testSize);

    function renderQuestion() {
        const q = activeQuestions[currentQ];
        document.getElementById('step-counter').innerText = `Jautājums ${currentQ + 1} no ${testSize}`;
        document.getElementById('progress-fill').style.width = `${(currentQ / testSize) * 100}%`;
        document.getElementById('q-text').innerText = q.q;
        
        const list = document.getElementById('options-list');
        list.innerHTML = '';
        q.a.forEach((alt, i) => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerText = alt;
            card.onclick = () => {
                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                userChoices[currentQ] = i;
                document.getElementById('next-btn').disabled = false;
            };
            list.appendChild(card);
        });
        document.getElementById('next-btn').disabled = true;
    }

    function nextQuestion() {
        if (userChoices[currentQ] === activeQuestions[currentQ].c) score++;
        currentQ++;
        if (currentQ < testSize) renderQuestion();
        else showResults();
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-correct').innerText = score;
        document.getElementById('res-wrong').innerText = testSize - score;

        const container = document.getElementById('review-container');
        activeQuestions.forEach((q, i) => {
            const correct = userChoices[i] === q.c;
            const div = document.createElement('div');
            div.className = `review-item ${correct ? 'is-correct' : ''}`;
            div.innerHTML = `
                <div class="review-q">${i+1}. ${q.q}</div>
                <div class="review-a">
                    ${correct ? '✅ ' : '❌ Jūsu: ' + q.a[userChoices[i]] + '<br>'}
                    <strong>Pareizi: ${q.a[q.c]}</strong>
                </div>
            `;
            container.appendChild(div);
        });
    }

    renderQuestion();
</script>

</body>
</html>
