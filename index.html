<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PŠP Meistarklase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #22c55e;
            --error: #ef4444;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #1e293b;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            align-self: flex-start;
        }

        /* Progresa josla */
        .progress-bar-bg {
            height: 8px;
            background: #334155;
            border-radius: 10px;
            margin: 20px 0 30px 0;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), #60a5fa);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        h1 { font-size: 1.4rem; font-weight: 800; margin: 0; color: var(--text); }
        .step-info { color: var(--text-dim); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }

        .question-text {
            font-size: 1.15rem;
            line-height: 1.4;
            font-weight: 600;
            margin-bottom: 24px;
            min-height: 60px;
        }

        .options-container { display: grid; gap: 12px; }

        .option-card {
            background: #334155;
            border: 2px solid transparent;
            border-radius: 18px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 1rem;
        }

        .option-card:active { transform: scale(0.97); }
        .option-card.selected { border-color: var(--primary); background: rgba(59, 130, 246, 0.15); }

        /* Review Sekcija */
        .review-item {
            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            text-align: left;
            border-left: 4px solid transparent;
        }
        .review-item.wrong { border-left-color: var(--error); }
        .review-item.correct { border-left-color: var(--success); }
        .review-q { font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; }
        .review-a { font-size: 0.85rem; color: var(--text-dim); }
        .highlight-correct { color: var(--success); font-weight: 600; }
        .highlight-wrong { color: var(--error); font-weight: 600; text-decoration: line-through; }

        .btn-action {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
        }
        .btn-action:disabled { opacity: 0.4; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-box { padding: 16px; border-radius: 18px; background: #334155; text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: 800; display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="quiz-screen">
        <span class="step-info" id="step-counter">Jautājums 1 no 3</span>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>

        <div id="question-container">
            <p class="question-text" id="q-text"></p>
            <div class="options-container" id="options-list"></div>
        </div>
        <button class="btn-action" id="next-btn" onclick="handleNext()" disabled>Turpināt</button>
    </div>

    <div id="result-screen" style="display:none; text-align: center;">
        <h1>Rezultāti</h1>
        <div class="stat-grid">
            <div class="stat-box">
                <span class="stat-val" style="color: var(--success);" id="correct-count">0</span>
                <span class="stat-label">Pareizas</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" style="color: var(--error);" id="incorrect-count">0</span>
                <span class="stat-label">Kļūdas</span>
            </div>
        </div>

        <div id="review-list" style="max-height: 300px; overflow-y: auto; margin-top: 20px;">
            </div>

        <button class="btn-action" onclick="location.reload()">Mēģināt vēlreiz</button>
    </div>
</div>

<script>
    // Uzlaboti jautājumi ar saistītiem variantiem
    const allQuestions = [
        { 
            q: "Kādi ir četri PŠP pamatprincipi?", 
            a: ["Stabila pozīcija, tēmēšana, elpošana, mēlītes nospiediens", "Stabila pozīcija, tēmēšana, aizturi, lēns šāviens", "Ieroča turēšana, tēmēšana, miers, lēnā mēlīte"], 
            c: 0 
        },
        { 
            q: "Kādam jābūt ķermeņa stāvoklim pēc iekārtošanās pozīcijā?", 
            a: ["Maksimāli sasprindzinātam stabilitātei", "Atslābinātam un nepiespiestam", "Nedaudz sasprindzinātam tikai plecu zonā"], 
            c: 1 
        },
        { 
            q: "Kāds ir galvenais stabilitātes pozīcijas mērķis?", 
            a: ["Pilnībā apturēt ieroča kustību", "Panākt pēc iespējas mazāku ieroča kustību", "Nodrošināt labāku redzamību caur mērķekli"], 
            c: 1 
        },
        { 
            q: "Kā tiek noteikta dominējošā acs?", 
            a: ["Aizverot vienu aci un skatoties fokusā", "Ar abu acu trijstūra metodi uz objektu", "Pēc tā, kurai acij ir asāka redze"], 
            c: 1 
        },
        { 
            q: "Uz ko fokusam jābūt tēmēšanas brīdī?", 
            a: ["Uz mērķi (tam jābūt skaidram)", "Uz graudu (tam jābūt skaidram)", "Uz mērķekļa apli (tam jābūt skaidram)"], 
            c: 1 
        },
        { 
            q: "Kur jāatrodas grauda augšai attiecībā pret mērķekli?", 
            a: ["Mērķekļa centrā", "Mērķekļa apakšējā malā", "Mērķekļa augšējā malā"], 
            c: 0 
        },
        { 
            q: "Kurā fāzē tiek izdarīts precīzs šāviens?", 
            a: ["Ieelpas vidū", "Dabīgā elpošanas pauzē pēc izelpas", "Pēc tam, kad elpa aizturēta uz 10 sekundēm"], 
            c: 1 
        },
        { 
            q: "Cik sekunžu ir optimālā pauze šāviena veikšanai?", 
            a: ["Aptuveni 1-2 sekundes", "Aptuveni 5-6 sekundes", "Nav ierobežojumu"], 
            c: 0 
        },
        { 
            q: "Ar kuru rādītājpirksta daļu jānospiež mēlīte?", 
            a: ["Pirksta vidusdaļu (starp locītavām)", "Pirksta gala vidējo daļu", "Pašu pirksta galu (nagu)"], 
            c: 1 
        },
        { 
            q: "Kāda ir pareiza mēlītes nospiešanas tehnika?", 
            a: ["Strauja un pēkšņa", "Lēna un šāvienam jābūt negaidītam", "Spēcīga, lai pārvarētu mehānismu"], 
            c: 1 
        }
    ];

    let currentStep = 0;
    let score = 0;
    let userAnswers = [];
    const totalSteps = 3;
    const quizQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, totalSteps);

    function initStep() {
        const q = quizQuestions[currentStep];
        document.getElementById('next-btn').disabled = true;
        
        const progress = (currentStep / totalSteps) * 100;
        document.getElementById('progress-fill').style.width = `${progress}%`;
        document.getElementById('step-counter').innerText = `Jautājums ${currentStep + 1} no ${totalSteps}`;

        document.getElementById('q-text').innerText = q.q;
        const list = document.getElementById('options-list');
        list.innerHTML = '';

        q.a.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option-card';
            div.innerText = opt;
            div.onclick = () => {
                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                div.classList.add('selected');
                userAnswers[currentStep] = i;
                document.getElementById('next-btn').disabled = false;
            };
            list.appendChild(div);
        });
    }

    function handleNext() {
        if (userAnswers[currentStep] === quizQuestions[currentStep].c) score++;
        
        currentStep++;
        if (currentStep < totalSteps) {
            initStep();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('progress-fill').style.width = `100%`;
        
        document.getElementById('correct-count').innerText = score;
        document.getElementById('incorrect-count').innerText = totalSteps - score;

        const reviewList = document.getElementById('review-list');
        reviewList.innerHTML = '<p style="color:var(--text-dim); font-size:0.8rem; margin-bottom:15px;">KĻŪDU ANALĪZE</p>';

        quizQuestions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.c;
            const item = document.createElement('div');
            item.className = `review-item ${isCorrect ? 'correct' : 'wrong'}`;
            
            let answerFeedback = isCorrect 
                ? `<span class="highlight-correct">${q.a[q.c]}</span>`
                : `<span class="highlight-wrong">${q.a[userAnswers[i]]}</span><br>Pareizi: <span class="highlight-correct">${q.a[q.c]}</span>`;

            item.innerHTML = `
                <div class="review-q">${i+1}. ${q.q}</div>
                <div class="review-a">${answerFeedback}</div>
            `;
            reviewList.appendChild(item);
        });
    }

    initStep();
</script>

</body>
</html>
